<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1116" />
    <meta name="description" content="Personalised min/max leveling plan for War Era. Paste your username, get a coaching report grounded in the top community guides." />
    <title>War Era Coach</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("warera-coach.theme");
          var pref = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          if (pref === "dark") document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="bg-bg text-text antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
